<!DOCTYPE>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title> 
Resturant
</title> 
</head>
<body>
  

<div class="carousel-container">

  <input type="radio" name="slider" id="s1" checked>
  <input type="radio" name="slider" id="s2">
  <input type="radio" name="slider" id="s3">

  <div class="carousel">

    <a href="Product1" class="slide one">
      <img src="https://media.istockphoto.com/id/2061716709/photo/grilled-rib-burger.webp" alt="Burger">
    </a>

    <a href="Product2" class="slide two">
      <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe" alt="Pizza">
    </a>

    <a href="Product3" class="slide three">
      <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" alt="Pasta">
    </a>

    <div class="nav">
      <label for="s3">❮</label>
      <label for="s2">❯</label>
    </div>

  </div>

  <div class="dots">
    <label for="s1"></label>
    <label for="s2"></label>
    <label for="s3"></label>
  </div>

</div>

  
</body> 
</html>
